</head>
<body>

    <nav class="container" style="padding: 2rem 0; justify-content: space-between; background: rgba(10,10,12,0.8); backdrop-filter: blur(10px); position: sticky; top:0; z-index: 100;">

    <main class="container">
        
        <section class="hero">

             <div class="word" id="dynamic-status"></div>

        </footer>

    </main>

    <script type="text/javascript">
        // Preserving your classic Ticker logic but targeting the new ID
        function Ticker(elem) {
            elem.lettering();
            this.done = false;
            this.cycleCount = 5;
            this.cycleCurrent = 0;
            this.chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%^&*()-_=+{}|[]\\;\':()"'.split('');
            this.charsCount = this.chars.length;
            this.original = elem.html();
            this.letters = elem.find('span');
            this.letterCount = this.letters.length;
            this.letterCurrent = 0;

            this.letters.each(function () {
                var $this = $(this);
                $this.attr('data-orig', $this.text());
                $this.text('-');
            });
        }

        Ticker.prototype.getChar = function () {
            return this.chars[ Math.floor(Math.random() * this.charsCount) ];
        };

        Ticker.prototype.reset = function () {
            this.done = false;
            this.cycleCurrent = 0;
            this.letterCurrent = 0;
            this.letters.each(function () {
                var $this = $(this);
                $this.text($this.attr('data-orig'));
                $this.removeClass('done');
            });
            this.loop();
        };

        Ticker.prototype.loop = function () {
            var self = this;

            this.letters.each(function (index, elem) {
                var $elem = $(elem);
                if (index >= self.letterCurrent) {
                    if ($elem.text() !== ' ') {
                        $elem.text(self.getChar());
                        $elem.css('opacity', Math.random()));
                       }
                }
            });

            if (this.cycleCurrent < this.cycleCount) {
                this.cycleCurrent++;
            } else if (this.letterCurrent < this.letterCount) {
                var currLetter = this.letters.eq(this.letterCurrent);
                this.cycleCurrent = 0;
                currLetter.text(currLetter.attr('data-orig')).css('opacity', 1).addClass('done');
                this.letterCurrent++;
            } else {
                this.done = true;
            }

            if (!this.done) {
                requestAnimationFrame(function () {
                    self.loop();
                });
            } else {
                var self = this;
                setTimeout(function () {
                    self.reset();
                }, 750);
            }
        };

        $(document).ready(function() {
          var $words = $('#dynamic-status');
          // Initialize with some sample text for the ticker to eat
          $words.html('<span style="color:#1ff042">SYSTEM READY [AUTHENTICATED]</span>');
          
          $words.each(function () {
            var $this = $(this),
                    ticker = new Ticker($this).reset();
            $this.data('ticker', ticker);
          });
        });

    </script>
</body>
</html>
